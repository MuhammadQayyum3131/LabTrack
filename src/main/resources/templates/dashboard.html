<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LabTrack - Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <a href="/dashboard" class="navbar-brand" style="display:flex; align-items:center; padding:0;">
        <svg viewBox="0 0 180 44" height="36" xmlns="http://www.w3.org/2000/svg">
            <line x1="18" y1="8" x2="18" y2="22" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <line x1="28" y1="8" x2="28" y2="22" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <line x1="18" y1="22" x2="11" y2="33" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <line x1="28" y1="22" x2="35" y2="33" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <path d="M11 33 Q23 42 35 33" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <path d="M17 25 L10 34 Q23 44 36 34 L29 25 Z" fill="#10B981" opacity="0.75"/>
            <circle cx="23" cy="35" r="2" fill="#fff" opacity="0.55"/>
            <circle cx="30" cy="32" r="1.5" fill="#fff" opacity="0.45"/>
            <line x1="13" y1="8" x2="33" y2="8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <circle cx="41" cy="17" r="2.5" fill="#EF4444"/>
            <circle cx="41" cy="25" r="2.5" fill="#10B981"/>
            <circle cx="41" cy="33" r="2.5" fill="#F59E0B"/>
            <text x="52" y="30" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="700" fill="#ffffff">Lab<tspan fill="#10B981">Track</tspan></text>
        </svg>
    </a>
    <div class="navbar-nav">
        <a href="/dashboard" class="navbar-link active">Dashboard</a>
        <a href="/samples/new" class="navbar-link">New Sample</a>
    </div>
    <div class="navbar-user">
        <span th:text="${#authentication.name}"></span>
        &nbsp;|&nbsp;
        <form method="post" action="/logout" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button type="submit" class="navbar-link"
                    style="background:none; border:none; cursor:pointer; padding:0;">
                Logout
            </button>
        </form>
    </div>
</nav>

<div class="page-content">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div class="page-title">Dashboard</div>
    <div class="page-subtitle">Welcome back, <span th:text="${#authentication.name}"></span></div>

    <!-- Stat Cards -->
    <div class="stat-grid">
        <div class="stat-card stat-default">
            <div class="stat-label">Total Samples</div>
            <div class="stat-value" th:text="${totalCount}">0</div>
        </div>
        <div class="stat-card stat-warning">
            <div class="stat-label">Pending</div>
            <div class="stat-value" th:text="${pendingCount}">0</div>
        </div>
        <div class="stat-card stat-success">
            <div class="stat-label">Completed</div>
            <div class="stat-value" th:text="${completedCount}">0</div>
        </div>
        <div class="stat-card stat-danger">
            <div class="stat-label">Flagged</div>
            <div class="stat-value" th:text="${flaggedCount}">0</div>
        </div>
    </div>

    <!-- Table -->
    <div class="table-card">
        <div class="table-toolbar">
            <input type="text" class="search-input"
                   placeholder="Search by patient name..."
                   onkeyup="filterTable(this.value)">
            <a href="/samples/new" class="btn btn-primary btn-sm">+ New Sample</a>
        </div>

        <table id="sampleTable">
            <thead>
            <tr>
                <th>Sample ID</th>
                <th>Patient Name</th>
                <th>Test Type</th>
                <th>Date</th>
                <th>Status</th>
                <th>Flag</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="sample : ${samples}"
                th:onclick="|window.location='/samples/' + ${sample.sampleID}|"
                th:classappend="${sample.result != null and sample.result.flag.name() == 'HIGH'} ? 'high-row' : (${sample.result != null and sample.result.flag.name() == 'LOW'} ? 'low-row' : '')"
                style="cursor:pointer">
                <td th:text="'S-' + ${currentYear} + '-' + ${#strings.toString(sample.sampleID).length() == 1 ? '00' + sample.sampleID : (#strings.toString(sample.sampleID).length() == 2 ? '0' + sample.sampleID : sample.sampleID)}"></td>
                <td th:text="${sample.patientName}"></td>
                <td th:text="${sample.testType.name}"></td>
                <td th:text="${sample.collectionDate}"></td>
                <td>
                        <span th:if="${sample.status.name() == 'RECEIVED'}"
                              class="badge badge-received">Received</span>
                    <span th:if="${sample.status.name() == 'IN_PROGRESS'}"
                          class="badge badge-progress">In Progress</span>
                    <span th:if="${sample.status.name() == 'COMPLETED'}"
                          class="badge badge-completed">Completed</span>
                </td>
                <td>
                    <span th:if="${sample.result == null}">—</span>
                    <span th:if="${sample.result != null and sample.result.flag.name() == 'HIGH'}"
                          class="badge badge-high">▲ HIGH</span>
                    <span th:if="${sample.result != null and sample.result.flag.name() == 'LOW'}"
                          class="badge badge-low">▼ LOW</span>
                    <span th:if="${sample.result != null and sample.result.flag.name() == 'NORMAL'}"
                          class="badge badge-normal">✓ NORMAL</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(samples)}">
                <td colspan="6" style="text-align:center; color:#8A94A6; padding:32px">
                    No samples registered yet. Click "+ New Sample" to get started.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
function filterTable(value) {
    const rows = document.querySelectorAll('#sampleTable tbody tr');
    rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(value.toLowerCase()) ? '' : 'none';
    });
}
</script>

</body>
</html>
