<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>LabTrack - Error</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card" style="text-align:center; max-width:420px;">

    <div style="margin-bottom:20px;">
      <svg viewBox="0 0 46 52" height="52" xmlns="http://www.w3.org/2000/svg">
        <line x1="16" y1="4" x2="16" y2="20" stroke="#1E2A3A" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="28" y1="4" x2="28" y2="20" stroke="#1E2A3A" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="16" y1="20" x2="8" y2="34" stroke="#1E2A3A" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="28" y1="20" x2="36" y2="34" stroke="#1E2A3A" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M8 34 Q22 46 36 34" fill="none" stroke="#1E2A3A" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M15 24 L7 35 Q22 48 37 35 L30 24 Z" fill="#10B981" opacity="0.8"/>
        <circle cx="20" cy="37" r="2.5" fill="#ffffff" opacity="0.7"/>
        <circle cx="28" cy="34" r="2" fill="#ffffff" opacity="0.55"/>
        <line x1="11" y1="4" x2="33" y2="4" stroke="#1E2A3A" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>

    <div style="font-size:48px; font-weight:700; color:#1E2A3A; font-family:'Courier New',monospace;"
         th:text="${status}">404</div>

    <div style="font-size:16px; font-weight:600; color:#1E2A3A; margin:8px 0 4px;">
      Oops — something went wrong
    </div>

    <div style="font-size:13px; color:#8A94A6; margin-bottom:24px;">
      The page you are looking for could not be found. Please go back to the dashboard.
    </div>

    <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
      <a href="/dashboard" class="btn btn-primary"
         style="display:inline-block; text-decoration:none; width:200px; text-align:center;">
        ← Back to Dashboard
      </a>
      <a href="/login" style="font-size:12px; color:#1E6FEB;">
        or go to Login
      </a>
    </div>

  </div>
</div>
</body>
</html>
